services:
  strata:
    type: daemon
    program: uv
    args: [run, --project, ~/workspace/infra/strata, strata, serve, --transport, http, --port, "8716"]
    hosts: [campbell]
  tectonic:
    type: command
    exec: "uv run --project ~/workspace/infra/tectonic tectonic"
    hosts: [blanc, everest, campbell, granite]
